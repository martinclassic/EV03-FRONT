<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-dark text-white text-center">
<!-- Actualizacion para hacer Pull Request -->
                    <h3>Gym Inacap - Login</h3>

                </div>

                <div class="card-body">

                    <h4 class="text-center mb-4">

                        Iniciar Sesión

                    </h4>

                    <div class="mb-3">

                        <label class="form-label">

                            Usuario

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            [(ngModel)]="usuario"
                            maxlength="15"
                            placeholder="Ingrese su usuario">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Contraseña

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            [(ngModel)]="password"
                            maxlength="20"
                            placeholder="Ingrese su contraseña">

                    </div>

                    <button
                        class="btn btn-success w-100"
                        (click)="ingresar()">

                        Ingresar

                    </button>

                    <div
                        class="alert alert-danger mt-3"
                        *ngIf="mensaje">

                        {{mensaje}}

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
