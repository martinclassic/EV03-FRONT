<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg border-0 rounded-4 login-card">

        <div class="card-body p-5">

            <div class="text-center mb-4">

                <div class="text-success fw-bold">
                    <h3>Gym Inacap - Login</h3>

                </div>

                <div class="card-body">

                    <h4 class="text-muted">

                        Iniciar Sesión

                    </h4>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Usuario

                        </label>

                        <input
                            type="text"
                            class="form-control"
                            [(ngModel)]="usuario"
                            maxlength="15"
                            placeholder="Ingrese su usuario">

                    </div>

                    <div class="mb-3">

                        <label class="form-label fw-semibold">

                            Contraseña

                        </label>

                        <input
                            type="password"
                            class="form-control"
                            [(ngModel)]="password"
                            maxlength="20"
                            placeholder="Ingrese su contraseña">

                    </div>

                    <button
                        class="alert alert-danger text-center mt-3"
                        (click)="ingresar()">

                        Ingresar

                    </button>

                    <div
                        class="alert alert-danger mt-3"
                        *ngIf="mensaje">

                        {{mensaje}}

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>
